info:
  name: 2. Login
  type: http
  seq: 2

http:
  method: POST
  url: "{{host}}/auth/login"
  body:
    type: json
    data: |-
      {
        "email":"{{user}}",
        "password":"{{password}}"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
